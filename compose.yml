name: matriz-dev-project
services:
  only_db:
    image: 'postgres:16'
    environment:
      - 'POSTGRES_DB=${DB_NAME}'
      - 'POSTGRES_PASSWORD=${DB_PASSWORD}'
      - 'POSTGRES_USER=${DB_USER}'
    ports:
      - '5432:5432'
    env_file:
      - .env
    labels:
      org.springframework.boot.service-connection: postgres
  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: devuser
      MINIO_ROOT_PASSWORD: devpassword
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  minio-setup:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set myminio http://minio:9000 devuser devpassword) do echo 'Waiting for MinIO...' && sleep 1; done;
      /usr/bin/mc mb myminio/matriz-images-buckets --ignore-existing;
      /usr/bin/mc anonymous set public myminio/matriz-images-buckets;
      exit 0;
      "

volumes:
  minio_data: